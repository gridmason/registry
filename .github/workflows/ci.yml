name: CI

# GitHub Actions natively skips runs whose head commit message contains
# `[skip ci]`, which the issue-flow sub-issue drafts rely on; the batch PR
# carries a normal commit that triggers this workflow once.
on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  container:
    name: Build image + healthcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t gridmason-registry:ci .
      - name: Boot container
        # #38 boot guard refuses TRANSPARENCY_LOG_DRIVER=memory under NODE_ENV=production; this is the documented self-host override for the smoke test.
        run: docker run -d --name registry -p 8080:8080 -e TRANSPARENCY_LOG_ALLOW_MEMORY_IN_PRODUCTION=true gridmason-registry:ci
      - name: Wait for /healthz to return 200
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/healthz || true)
            if [ "$code" = "200" ]; then
              echo "healthz returned 200"
              curl -s http://127.0.0.1:8080/healthz
              exit 0
            fi
            echo "attempt $i: healthz returned '$code', retrying..."
            sleep 1
          done
          echo "healthz did not return 200 in time"
          docker logs registry
          exit 1
      - name: Stop container
        if: always()
        run: docker rm -f registry || true

  self-host-smoke:
    name: Self-host quickstart smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Steps mirror the docs/self-host/install.md quickstart in its documented
      # order (§1 bring up the stack → §2 trust roots → §3 policy page → §4 publish).
      # §2 and §3 are self-contained local generation steps that do not depend on the
      # running stack, so their placement is honest, not load-bearing.

      # Step 1 (§1): bring up the whole compose stack (image + Postgres + object
      # store), which runs migrations and starts the service.
      - name: docker compose up
        run: docker compose up --build -d

      - name: Wait for /readyz to report ready
        run: |
          for i in $(seq 1 60); do
            body=$(curl -s http://127.0.0.1:8080/readyz || true)
            code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/readyz || true)
            if [ "$code" = "200" ]; then
              echo "readyz: $body"
              exit 0
            fi
            echo "attempt $i: readyz returned '$code', retrying..."
            sleep 2
          done
          echo "instance did not reach ready in time"
          docker compose logs
          exit 1

      # Step 2 (§2): generate the trust roots. Prove `trust-root:init` produces a
      # valid @gridmason/protocol TrustRootDoc from a fresh countersign key.
      - name: Generate a countersign key + trust root
        run: |
          openssl ecparam -name prime256v1 -genkey -noout -out countersign.key
          openssl req -x509 -new -key countersign.key -days 365 \
            -subj "/CN=smoke.local countersign" -out countersign.crt
          REGISTRY_ID=smoke.local \
          OIDC_ISSUER_ALLOWLIST=https://token.actions.githubusercontent.com \
          COUNTERSIGN_PRIVATE_KEY="$(cat countersign.key)" \
          COUNTERSIGN_CERTIFICATE="$(cat countersign.crt)" \
          npm run trust-root:init
          test -f trust-root.json
          node -e "const d=require('./trust-root.json'); if(!d.countersignRoots?.[0]?.startsWith('sha256:')) { console.error('bad trust root', d); process.exit(1); } console.log('trust root ok:', d.countersignRoots[0])"

      # Step 3 (§3): the self-host policy page renders.
      - name: Render the self-host policy page
        run: npm run policy:render -- --variant self-host --stdout > /dev/null

      # Step 4 (§4): the publish target responds. Unauthenticated → 401 proves the
      # endpoint is mounted and reachable (a 404 would mean it is not).
      - name: Assert the publish target responds
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST http://127.0.0.1:8080/v1/artifacts \
            -H 'content-type: application/json' -d '{}')
          echo "POST /v1/artifacts → $code"
          if [ "$code" != "401" ]; then
            echo "expected 401 (publishable, endpoint mounted), got '$code'"
            docker compose logs
            exit 1
          fi

      - name: Tear down
        if: always()
        run: docker compose down -v || true
